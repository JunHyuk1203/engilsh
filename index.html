<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Song Grammar PPT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
    <div class="bg-blur"></div>
    
    <div id="app">
        <!-- Title Slide -->
        <div id="slide-title" class="slide">
            <h1 class="title">Pop Song Grammar</h1>
            <p class="subtitle">팝송으로 마스터하는 핵심 영문법</p>
        </div>

        <!-- Song 1 Intro -->
        <div id="slide-intro-0" class="slide intro-slide">
            <div class="album-cover">
                <img src="https://images.unsplash.com/photo-1529156069898-49953eb1f5f6?w=500&q=80" alt="See You Again">
            </div>
            <div class="intro-info">
                <h2>See You Again</h2>
                <h3>Wiz Khalifa (feat. Charlie Puth)</h3>
                <div class="grammar-box">
                    <h4>✨ 이 노래의 핵심 문법</h4>
                    <p>현재완료 시제, 관계대명사 that, 부사절 접속사 등 일상 회화에서 감정을 깊이 있게 표현할 때 꼭 필요한 필수 구문들이 가득합니다.</p>
                </div>
            </div>
        </div>

        <!-- Song 1 Lyrics -->
        <div id="slide-lyrics-0" class="slide lyrics-slide">
            <div class="lyrics-wrapper" id="lyrics-wrapper-0">
                <!-- Lyrics will be injected here by JS -->
            </div>
        </div>

        <!-- Song 2 Intro -->
        <div id="slide-intro-1" class="slide intro-slide">
            <div class="album-cover">
                <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=500&q=80" alt="A Thousand Years">
            </div>
            <div class="intro-info">
                <h2>A Thousand Years</h2>
                <h3>Christina Perri</h3>
                <div class="grammar-box">
                    <h4>✨ 이 노래의 핵심 문법</h4>
                    <p>주어와 동사의 수일치, to부정사, 지각동사 등 문장을 길게 이어주는 필수적인 영어 구조가 아름다운 가사에 담겨 있습니다.</p>
                </div>
            </div>
        </div>

        <!-- Song 2 Lyrics -->
        <div id="slide-lyrics-1" class="slide lyrics-slide">
            <div class="lyrics-wrapper" id="lyrics-wrapper-1">
                <!-- Lyrics will be injected here by JS -->
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button id="prev-btn" title="Previous (Left Arrow)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button id="next-btn" title="Next (Right Arrow / Space)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
